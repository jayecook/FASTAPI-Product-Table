{% extends "base.html" %}
{% block content %}
<div class="card" style="max-width:560px;margin:40px auto;">
  <h2>Create Account</h2>
  <form method="POST">
    <input type="text" name="full_name" placeholder="Full name" required style="width:95%;">
    <input type="email" name="email" placeholder="Email" required style="width:95%;">
    <input type="password" name="password" placeholder="Password" required style="width:95%;">
    <select name="role" style="width:98%;">
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select>
    <button class="primary" type="submit">Register</button>
  </form>
  <p>Already registered? <a href="{{ url_for('login') }}">Log in</a></p>
</div>
{% endblock %}
